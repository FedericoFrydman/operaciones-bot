<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nueva Operacion</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
    background-color: #0e0e0e !important;
    color: #ffffff !important;
    padding: 16px !important;
    padding-bottom: 100px !important;
    min-height: 100vh !important;
  }
 
  h1 {
    font-size: 22px !important;
    text-align: center !important;
    margin-bottom: 16px !important;
    color: #ffffff !important;
  }
 
  .field { margin-bottom: 18px !important; position: relative !important; z-index: 1 !important; }
  .field.z-high { z-index: 20 !important; }
  .field.z-med { z-index: 10 !important; }
 
  label {
    display: block !important;
    font-size: 13px !important;
    font-weight: 600 !important;
    margin-bottom: 8px !important;
    color: #8e8e93 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.5px !important;
  }
 
  input[type="text"], textarea {
    width: 100% !important;
    padding: 14px !important;
    border-radius: 12px !important;
    border: 1px solid #3a3a3c !important;
    background-color: #2c2c2e !important;
    color: #ffffff !important;
    font-size: 16px !important;
    outline: none !important;
    -webkit-appearance: none !important;
  }
 
  input::placeholder, textarea::placeholder { color: #636366 !important; }
  input:focus, textarea:focus { border-color: #3390ec !important; }
  textarea { height: 70px !important; resize: none !important; }
 
  .tipo-buttons { display: flex !important; gap: 10px !important; flex-wrap: wrap !important; }
 
  .tipo-btn {
    flex: 1 !important;
    padding: 16px !important;
    border-radius: 12px !important;
    border: 2px solid #3a3a3c !important;
    background-color: #2c2c2e !important;
    color: #ffffff !important;
    font-size: 15px !important;
    font-weight: 600 !important;
    text-align: center !important;
    cursor: pointer !important;
  }
 
  .tipo-btn.active {
    border-color: #3390ec !important;
    background-color: #3390ec !important;
    color: #ffffff !important;
  }
 
  .search-container { position: relative !important; }
 
  .search-results {
    position: fixed !important;
    left: 16px !important;
    right: 16px !important;
    background-color: #1c1c1e !important;
    border: 1px solid #48484a !important;
    border-radius: 12px !important;
    max-height: 220px !important;
    overflow-y: auto !important;
    z-index: 99999 !important;
    display: none !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.9) !important;
  }
 
  .search-results.active { display: block !important; }
 
  .error-msg {
    color: #ff453a !important;
    font-size: 12px !important;
    margin-top: 6px !important;
    display: none;
  }
 
  .loading-screen {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;
    height: 80vh !important;
    font-size: 16px !important;
    color: #8e8e93 !important;
    gap: 12px !important;
  }
 
  .spinner {
    width: 32px !important;
    height: 32px !important;
    border: 3px solid #3a3a3c !important;
    border-top: 3px solid #3390ec !important;
    border-radius: 50% !important;
    animation: spin 0.8s linear infinite !important;
  }
 
  @keyframes spin { to { transform: rotate(360deg); } }
 
  #formContainer { display: none; }

  /* COLA DE OPERACIONES */
  #colaContainer {
    margin-bottom: 18px;
    display: none;
  }

  #colaLabel {
    font-size: 13px;
    font-weight: 600;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .cola-item {
    background-color: #1c1c1e;
    border: 1px solid #3a3a3c;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 14px;
    color: #ffffff;
  }

  .cola-item-info { flex: 1; line-height: 1.5; }
  .cola-item-info span { color: #8e8e93; font-size: 12px; }

  .cola-item-remove {
    color: #ff453a;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    padding-left: 12px;
    opacity: 0.8;
  }

  /* BOTONES INFERIORES */
  #botonesContainer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px;
    background-color: #0e0e0e;
    display: flex;
    gap: 10px;
    z-index: 100;
  }

  #btnAgregar {
    width: 54px;
    height: 54px;
    border-radius: 14px;
    background-color: #2c2c2e;
    border: 2px solid #3a3a3c;
    color: #ffffff;
    font-size: 28px;
    font-weight: 300;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #btnAgregar:active { background-color: #3a3a3c; }

  #btnConfirmar {
    flex: 1;
    height: 54px;
    border-radius: 14px;
    background-color: #3390ec;
    border: none;
    color: #ffffff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }

  #btnConfirmar:active { background-color: #2070cc; }
  #btnConfirmar:disabled { opacity: 0.5; }
</style>
</head>
<body>
 
<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  Cargando datos...
</div>
 
<div id="formContainer">
  <!-- COLA -->
  <div id="colaContainer">
    <div id="colaLabel">En cola</div>
    <div id="colaItems"></div>
  </div>
 
  <div class="field">
    <label>Tipo</label>
    <div class="tipo-buttons" id="tipoButtons"></div>
    <div class="error-msg" id="tipoError">Selecciona un tipo</div>
  </div>
 
  <div class="field">
    <label>Monto</label>
    <input type="text" id="monto" placeholder="Ej: 5000" inputmode="decimal">
    <div class="error-msg" id="montoError">Ingresa un monto valido</div>
  </div>
 
  <div class="field z-high">
    <label>Cliente (opcional)</label>
    <div class="search-container">
      <input type="text" id="clienteSearch" placeholder="Buscar cliente..." autocomplete="off">
      <div class="search-results" id="clienteResults"></div>
    </div>
    <div id="clienteSelected"></div>
  </div>
 
  <div class="field z-med">
    <label>Metodo de Pago</label>
    <div class="search-container">
      <input type="text" id="metodoSearch" placeholder="Buscar metodo..." autocomplete="off">
      <div class="search-results" id="metodoResults"></div>
    </div>
    <div id="metodoSelected"></div>
    <div class="error-msg" id="metodoError">Selecciona un metodo de pago</div>
  </div>
 
  <div class="field">
    <label>Notas (opcional)</label>
    <textarea id="notas" placeholder="Ej: BCP a Nicothegoat"></textarea>
  </div>
 
  <div style="text-align:center;margin-bottom:20px;">
    <span id="deleteBtn" style="display:inline-block;padding:10px 20px;background-color:#ff453a;color:#ffffff;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">🗑 Eliminar mi ultima operacion</span>
  </div>
</div>

<!-- BOTONES FIJOS -->
<div id="botonesContainer" style="display:none;">
  <div id="btnAgregar" title="Agregar a cola">+</div>
  <button id="btnConfirmar">✅ CONFIRMAR</button>
</div>
 
<script>
var API_URL = "https://script.google.com/macros/s/AKfycbz_Kf5iNIwm4jadZwaCoLdE4hVntcxeURf4vFj8I-UOpUqM1YAL6-dVO_GtVTt461s/exec";
 
var tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
try { tg.setBackgroundColor("#0e0e0e"); tg.setHeaderColor("#0e0e0e"); } catch(e) {}

// Ocultar el MainButton de Telegram — usamos nuestros propios botones
tg.MainButton.hide();
 
var listas = {};
var selectedTipo = "";
var selectedCliente = "";
var selectedMetodo = "";
var cola = []; // lista de operaciones acumuladas
 
var userId = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
 
if (!userId) {
  document.getElementById("loadingScreen").innerHTML = "<div style='color:#ff453a;text-align:center;font-size:16px;'>No se pudo verificar tu identidad.<br><br><span style=\"color:#8e8e93;font-size:14px;\">Abri este formulario desde Telegram.</span></div>";
} else {
  fetch(API_URL + "?action=verificar&userId=" + userId)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.autorizado) {
        document.getElementById("loadingScreen").style.cssText = "display:flex !important;flex-direction:column;align-items:center;justify-content:center;height:80vh;";
        document.getElementById("loadingScreen").innerHTML = "<div style='color:#ff453a;text-align:center;font-size:18px;font-weight:600;'>⛔ No estas autorizado</div><div style='color:#8e8e93;text-align:center;font-size:14px;margin-top:12px;'>Debes ser miembro del grupo<br>para usar este formulario.</div>";
        return;
      }
      listas = data.listas;
      buildForm();
      document.getElementById("loadingScreen").style.cssText = "display:none !important";
      document.getElementById("formContainer").style.display = "block";
      document.getElementById("botonesContainer").style.display = "flex";
    })
    .catch(function(err) {
      document.getElementById("loadingScreen").innerHTML = "<div style='color:#ff453a'>Error al cargar: " + err + "</div>";
    });
}
 
// ============================================================
// CONSTRUIR FORMULARIO
// ============================================================
function buildForm() {
  var container = document.getElementById("tipoButtons");
  listas.tipos.forEach(function(tipo) {
    var btn = document.createElement("div");
    btn.className = "tipo-btn";
    btn.textContent = tipo;
    btn.style.cssText = "flex:1;padding:16px;border-radius:12px;border:2px solid #3a3a3c;background-color:#2c2c2e;color:#ffffff;font-size:15px;font-weight:600;text-align:center;cursor:pointer;";
    btn.onclick = function() {
      document.querySelectorAll(".tipo-btn").forEach(function(b) {
        b.classList.remove("active");
        b.style.backgroundColor = "#2c2c2e";
        b.style.borderColor = "#3a3a3c";
      });
      btn.classList.add("active");
      btn.style.backgroundColor = "#3390ec";
      btn.style.borderColor = "#3390ec";
      selectedTipo = tipo;
      hide("tipoError");
    };
    container.appendChild(btn);
  });
 
  var montoInput = document.getElementById("monto");
  montoInput.addEventListener("input", function() {
    this.value = this.value.replace(/,/g, "").replace(/[^0-9.]/g, "");
    var parts = this.value.split(".");
    if (parts.length > 2) this.value = parts[0] + "." + parts.slice(1).join("");
  });
  montoInput.addEventListener("keypress", function(e) {
    if (e.key === "," || e.key === "-" || e.key === "e" || e.key === "+") {
      e.preventDefault();
    }
  });
 
  setupSearch("clienteSearch", "clienteResults", "clienteSelected", listas.clientes, function(val) {
    selectedCliente = val;
  });
 
  setupSearch("metodoSearch", "metodoResults", "metodoSelected", listas.metodos, function(val) {
    selectedMetodo = val;
    hide("metodoError");
  });
 
  var clienteInput = document.getElementById("clienteSearch");
  clienteInput.addEventListener("blur", function() {
    var self = this;
    setTimeout(function() {
      if (self.value !== "" && selectedCliente === "") {
        self.value = "";
      }
    }, 300);
  });
}
 
// ============================================================
// BUSCADOR CON DROPDOWN
// ============================================================
function setupSearch(inputId, resultsId, selectedId, list, onSelect) {
  var input = document.getElementById(inputId);
  var results = document.getElementById(resultsId);
  var selectedDiv = document.getElementById(selectedId);
 
  input.addEventListener("focus", function() {
    var self = this;
    setTimeout(function() {
      self.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 350);
  });

  input.addEventListener("input", function() {
    var q = this.value.toLowerCase().trim();
    results.innerHTML = "";
    
    // Posicionar el dropdown justo debajo del input
    var rect = input.getBoundingClientRect();
    results.style.top = (rect.bottom + 4) + "px";

    if (q.length === 0) {
      results.classList.remove("active");
      return;
    }
 
    var matches = [];
    for (var i = 0; i < list.length && matches.length < 8; i++) {
      if (list[i].toLowerCase().indexOf(q) >= 0) {
        matches.push(list[i]);
      }
    }
 
    if (matches.length === 0) {
      results.classList.remove("active");
      return;
    }
 
    matches.forEach(function(match) {
      var item = document.createElement("div");
      item.textContent = match;
      item.style.cssText = "padding:12px 14px;cursor:pointer;font-size:15px;color:#ffffff;background-color:#1c1c1e;border-bottom:1px solid #2c2c2e;";
      item.ontouchstart = function() { this.style.backgroundColor = "#3390ec"; };
      item.ontouchend = function() { this.style.backgroundColor = "#1c1c1e"; };
      item.onclick = function() {
        onSelect(match);
        input.value = "";
        input.style.display = "none";
        results.classList.remove("active");
        selectedDiv.innerHTML = "";
        var tag = document.createElement("span");
        tag.style.cssText = "display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background-color:#3390ec;color:#ffffff;border-radius:10px;margin-top:8px;font-size:14px;font-weight:500;";
        tag.textContent = match + " ";
        var clearBtn = document.createElement("span");
        clearBtn.textContent = "✕";
        clearBtn.style.cssText = "cursor:pointer;font-weight:bold;opacity:0.8;font-size:16px;";
        clearBtn.onclick = function(e) {
          e.stopPropagation();
          selectedDiv.innerHTML = "";
          input.style.display = "block";
          input.value = "";
          if (selectedId === "clienteSelected") selectedCliente = "";
          if (selectedId === "metodoSelected") selectedMetodo = "";
        };
        tag.appendChild(clearBtn);
        selectedDiv.appendChild(tag);
      };
      results.appendChild(item);
    });
 
    results.classList.add("active");
  });
 
  document.addEventListener("click", function(e) {
    if (!input.contains(e.target) && !results.contains(e.target)) {
      results.classList.remove("active");
    }
  });
}

// ============================================================
// VALIDAR FORMULARIO
// ============================================================
function validarForm() {
  var valid = true;

  if (!selectedTipo) { show("tipoError"); valid = false; } else { hide("tipoError"); }

  var montoVal = document.getElementById("monto").value;
  var monto = parseFloat(montoVal);
  if (!montoVal || isNaN(monto) || monto <= 0) {
    show("montoError"); valid = false;
  } else { hide("montoError"); }

  var clienteInput = document.getElementById("clienteSearch");
  if (clienteInput.value !== "" && selectedCliente === "") {
    clienteInput.value = "";
  }

  if (!selectedMetodo) { show("metodoError"); valid = false; } else { hide("metodoError"); }

  return valid;
}

// ============================================================
// LIMPIAR FORMULARIO
// ============================================================
function limpiarForm() {
  // Tipo
  document.querySelectorAll(".tipo-btn").forEach(function(b) {
    b.classList.remove("active");
    b.style.backgroundColor = "#2c2c2e";
    b.style.borderColor = "#3a3a3c";
  });
  selectedTipo = "";

  // Monto
  document.getElementById("monto").value = "";

  // Cliente
  selectedCliente = "";
  document.getElementById("clienteSearch").value = "";
  document.getElementById("clienteSearch").style.display = "block";
  document.getElementById("clienteSelected").innerHTML = "";

  // Metodo
  selectedMetodo = "";
  document.getElementById("metodoSearch").value = "";
  document.getElementById("metodoSearch").style.display = "block";
  document.getElementById("metodoSelected").innerHTML = "";

  // Notas
  document.getElementById("notas").value = "";
}

// ============================================================
// RENDERIZAR COLA
// ============================================================
function renderCola() {
  var container = document.getElementById("colaContainer");
  var items = document.getElementById("colaItems");

  if (cola.length === 0) {
    container.style.display = "none";
    return;
  }

  container.style.display = "block";
  items.innerHTML = "";

  cola.forEach(function(op, idx) {
    var div = document.createElement("div");
    div.className = "cola-item";
    div.innerHTML =
      "<div class='cola-item-info'>" +
        "<strong>" + op.tipo + "</strong> — " + op.monto +
        (op.cliente ? "<br><span>" + op.cliente + " · " + op.metodo + "</span>" : "<br><span>" + op.metodo + "</span>") +
      "</div>" +
      "<div class='cola-item-remove' data-idx='" + idx + "'>✕</div>";
    items.appendChild(div);
  });

  // Botones de eliminar de la cola
  items.querySelectorAll(".cola-item-remove").forEach(function(btn) {
    btn.onclick = function() {
      var idx = parseInt(this.getAttribute("data-idx"));
      cola.splice(idx, 1);
      renderCola();
    };
  });
}

// ============================================================
// BOTON +: AGREGAR A COLA
// ============================================================
document.getElementById("btnAgregar").onclick = function() {
  if (!validarForm()) return;

  var monto = parseFloat(document.getElementById("monto").value);

  cola.push({
    tipo: selectedTipo,
    monto: monto,
    cliente: selectedCliente,
    metodo: selectedMetodo,
    notas: document.getElementById("notas").value || ""
  });

  renderCola();
  limpiarForm();

  // Scroll arriba para ver la cola
  window.scrollTo({ top: 0, behavior: "smooth" });
};

// ============================================================
// BOTON CONFIRMAR: ENVIAR TODO
// ============================================================
document.getElementById("btnConfirmar").onclick = function() {
  if (!validarForm()) return;

  var monto = parseFloat(document.getElementById("monto").value);

  // Agregar la operación actual a la cola
  var operacionActual = {
    tipo: selectedTipo,
    monto: monto,
    cliente: selectedCliente,
    metodo: selectedMetodo,
    notas: document.getElementById("notas").value || ""
  };

  var todasLasOps = cola.concat([operacionActual]);

  var btnConfirmar = document.getElementById("btnConfirmar");
  var btnAgregar = document.getElementById("btnAgregar");
  btnConfirmar.disabled = true;
  btnConfirmar.textContent = "Guardando...";
  btnAgregar.style.opacity = "0.5";
  btnAgregar.style.pointerEvents = "none";

  var userName = "Usuario";
  try {
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
      userName = tg.initDataUnsafe.user.first_name;
      if (tg.initDataUnsafe.user.last_name) userName += " " + tg.initDataUnsafe.user.last_name;
    }
  } catch(e) {}

  // Enviar una por una en secuencia
  function enviarSiguiente(idx) {
    if (idx >= todasLasOps.length) {
      // Todo enviado
      btnConfirmar.disabled = false;
      btnConfirmar.textContent = "✅ CONFIRMAR";
      btnAgregar.style.opacity = "1";
      btnAgregar.style.pointerEvents = "auto";
      cola = [];
      renderCola();
      limpiarForm();
      if (todasLasOps.length === 1) {
        tg.showAlert("Operacion registrada");
      } else {
        tg.showAlert(todasLasOps.length + " operaciones registradas");
      }
      setTimeout(function() { tg.close(); }, 1500);
      return;
    }

    var op = todasLasOps[idx];
    btnConfirmar.textContent = "Guardando " + (idx + 1) + "/" + todasLasOps.length + "...";

    setTimeout(function() {
    fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain"},
      body: JSON.stringify({
        tipo: op.tipo,
        monto: op.monto,
        cliente: op.cliente,
        metodo: op.metodo,
        notas: op.notas,
        userName: userName,
        telegramUserId: userId
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.ok) {
        enviarSiguiente(idx + 1);
      } else {
        btnConfirmar.disabled = false;
        btnConfirmar.textContent = "✅ CONFIRMAR";
        btnAgregar.style.opacity = "1";
        btnAgregar.style.pointerEvents = "auto";
        try { tg.showAlert("Error en operacion " + (idx + 1) + ": " + (result.error || "")); } catch(e) { alert("Error en operacion " + (idx+1) + ": " + (result.error||"")); }
      }
    })
    .catch(function(err) {
      btnConfirmar.disabled = false;
      btnConfirmar.textContent = "✅ CONFIRMAR";
      btnAgregar.style.opacity = "1";
      btnAgregar.style.pointerEvents = "auto";
      try { tg.showAlert("Error de conexion: " + err); } catch(e) { alert("Error de conexion: " + err); }
    });
    }, idx === 0 ? 0 : 1500);
  }

  enviarSiguiente(0);
};
 
// ============================================================
// ELIMINAR ULTIMA OPERACION
// ============================================================
document.getElementById("deleteBtn").onclick = function() {
  document.getElementById("deleteBtn").textContent = "Consultando...";
  document.getElementById("deleteBtn").style.opacity = "0.5";

  fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "text/plain"},
    body: JSON.stringify({
      action: "consultar_ultima",
      telegramUserId: userId
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    document.getElementById("deleteBtn").textContent = "🗑 Eliminar mi ultima operacion";
    document.getElementById("deleteBtn").style.opacity = "1";

    if (!result.ok) {
      tg.showAlert(result.error || "No se encontro operacion");
      return;
    }

    var op = result.operacion;
    var msg = "Queres eliminar esta operacion?\n\n";
    msg += "Tipo: " + op.tipo + "\n";
    msg += "Monto: " + op.monto + "\n";
    if (op.cliente) msg += "Cliente: " + op.cliente + "\n";
    msg += "Metodo: " + op.metodo + "\n";
    msg += "Fila: " + op.fila;

    if (!confirm(msg)) return;

    var userName = "Usuario";
    try {
      if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        userName = tg.initDataUnsafe.user.first_name;
        if (tg.initDataUnsafe.user.last_name) userName += " " + tg.initDataUnsafe.user.last_name;
      }
    } catch(e) {}

    document.getElementById("deleteBtn").textContent = "Eliminando...";
    document.getElementById("deleteBtn").style.opacity = "0.5";

    fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain"},
      body: JSON.stringify({
        action: "eliminar",
        telegramUserId: userId,
        userName: userName
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(delResult) {
      document.getElementById("deleteBtn").textContent = "🗑 Eliminar mi ultima operacion";
      document.getElementById("deleteBtn").style.opacity = "1";
      if (delResult.ok) {
        tg.showAlert(delResult.mensaje);
      } else {
        tg.showAlert("Error: " + (delResult.error || ""));
      }
    })
    .catch(function(err) {
      document.getElementById("deleteBtn").textContent = "🗑 Eliminar mi ultima operacion";
      document.getElementById("deleteBtn").style.opacity = "0.5";
      tg.showAlert("Error: " + err);
    });
  })
  .catch(function(err) {
    document.getElementById("deleteBtn").textContent = "🗑 Eliminar mi ultima operacion";
    document.getElementById("deleteBtn").style.opacity = "1";
    tg.showAlert("Error: " + err);
  });
};
 
function show(id) { document.getElementById(id).style.display = "block"; }
function hide(id) { document.getElementById(id).style.display = "none"; }
</script>
</body>
