<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nueva Operacion</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0e0e0e;
    --card: #1c1c1e;
    --border: #3a3a3c;
    --text: #ffffff;
    --hint: #8e8e93;
    --accent: #3390ec;
    --accent-text: #ffffff;
    --error: #ff453a;
    --input-bg: #2c2c2e;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Roboto, sans-serif;
background: var(–bg);
color: var(–text);
padding: 16px;
padding-bottom: 100px;
min-height: 100vh;
}

h1 {
font-size: 22px;
text-align: center;
margin-bottom: 24px;
color: var(–text);
}

.field { margin-bottom: 18px; }

label {
display: block;
font-size: 13px;
font-weight: 600;
margin-bottom: 8px;
color: var(–hint);
text-transform: uppercase;
letter-spacing: 0.5px;
}

input[type=“number”], input[type=“text”], textarea {
width: 100%;
padding: 14px;
border-radius: 12px;
border: 1px solid var(–border);
background: var(–input-bg);
color: var(–text);
font-size: 16px;
outline: none;
-webkit-appearance: none;
}

input::placeholder, textarea::placeholder {
color: var(–hint);
}

input:focus, textarea:focus {
border-color: var(–accent);
}

textarea { height: 70px; resize: none; }

.tipo-buttons { display: flex; gap: 10px; }

.tipo-btn {
flex: 1;
padding: 16px;
border-radius: 12px;
border: 2px solid var(–border);
background: var(–input-bg);
color: var(–text);
font-size: 15px;
font-weight: 600;
text-align: center;
cursor: pointer;
transition: all 0.15s;
}

.tipo-btn.active {
border-color: var(–accent);
background: var(–accent);
color: var(–accent-text);
}

.search-container { position: relative; }

.search-results {
position: absolute;
top: 100%;
left: 0; right: 0;
background: var(–card);
border: 1px solid var(–border);
border-radius: 12px;
margin-top: 4px;
max-height: 200px;
overflow-y: auto;
z-index: 100;
display: none;
}

.search-results.active { display: block; }

.search-result-item {
padding: 12px 14px;
cursor: pointer;
font-size: 15px;
color: var(–text);
border-bottom: 1px solid var(–border);
}

.search-result-item:last-child { border-bottom: none; }

.search-result-item:active {
background: var(–accent);
color: var(–accent-text);
}

.selected-tag {
display: inline-flex;
align-items: center;
gap: 8px;
padding: 8px 14px;
background: var(–accent);
color: var(–accent-text);
border-radius: 10px;
margin-top: 8px;
font-size: 14px;
font-weight: 500;
}

.selected-tag .clear-btn {
cursor: pointer;
font-weight: bold;
opacity: 0.8;
font-size: 16px;
}

.error-msg {
color: var(–error);
font-size: 12px;
margin-top: 6px;
display: none;
}

.loading-screen {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 80vh;
font-size: 16px;
color: var(–hint);
gap: 12px;
}

.spinner {
width: 32px;
height: 32px;
border: 3px solid var(–border);
border-top: 3px solid var(–accent);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}

@keyframes spin {
to { transform: rotate(360deg); }
}

#formContainer { display: none; }
</style>

</head>
<body>

<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  Cargando datos...
</div>

<div id="formContainer">
  <h1>📋 Nueva Operacion</h1>

  <div class="field">
    <label>Tipo</label>
    <div class="tipo-buttons" id="tipoButtons"></div>
    <div class="error-msg" id="tipoError">Selecciona un tipo</div>
  </div>

  <div class="field">
    <label>Monto</label>
    <input type="number" id="monto" placeholder="Ej: 5000" inputmode="numeric">
    <div class="error-msg" id="montoError">Ingresa un monto valido</div>
  </div>

  <div class="field">
    <label>Cliente</label>
    <div class="search-container">
      <input type="text" id="clienteSearch" placeholder="Buscar cliente..." autocomplete="off">
      <div class="search-results" id="clienteResults"></div>
    </div>
    <div id="clienteSelected"></div>
    <div class="error-msg" id="clienteError">Selecciona un cliente</div>
  </div>

  <div class="field">
    <label>Metodo de Pago</label>
    <div class="search-container">
      <input type="text" id="metodoSearch" placeholder="Buscar metodo..." autocomplete="off">
      <div class="search-results" id="metodoResults"></div>
    </div>
    <div id="metodoSelected"></div>
    <div class="error-msg" id="metodoError">Selecciona un metodo de pago</div>
  </div>

  <div class="field">
    <label>Notas (opcional)</label>
    <textarea id="notas" placeholder="Ej: BCP a Nicothegoat"></textarea>
  </div>
</div>

<script>
var API_URL = "https://script.google.com/macros/s/AKfycbz_Kf5iNIwm4jadZwaCoLdE4hVntcxeURf4vFj8I-UOpUqM1YAL6-dVO_GtVTt461s/exec";

var tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

var listas = {};
var selectedTipo = "";
var selectedCliente = "";
var selectedMetodo = "";

fetch(API_URL + "?action=listas")
  .then(function(r) { return r.json(); })
  .then(function(data) {
    listas = data;
    buildForm();
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("formContainer").style.display = "block";
    tg.MainButton.setText("✅ CONFIRMAR");
    tg.MainButton.show();
  })
  .catch(function(err) {
    document.getElementById("loadingScreen").innerHTML = "<div style='color:#ff453a'>Error al cargar: " + err + "</div>";
  });

function buildForm() {
  var container = document.getElementById("tipoButtons");
  listas.tipos.forEach(function(tipo) {
    var btn = document.createElement("div");
    btn.className = "tipo-btn";
    btn.textContent = tipo;
    btn.onclick = function() {
      document.querySelectorAll(".tipo-btn").forEach(function(b) { b.classList.remove("active"); });
      btn.classList.add("active");
      selectedTipo = tipo;
      hide("tipoError");
    };
    container.appendChild(btn);
  });

  setupSearch("clienteSearch", "clienteResults", "clienteSelected", listas.clientes, function(val) {
    selectedCliente = val;
    hide("clienteError");
  });

  setupSearch("metodoSearch", "metodoResults", "metodoSelected", listas.metodos, function(val) {
    selectedMetodo = val;
    hide("metodoError");
  });
}

function setupSearch(inputId, resultsId, selectedId, list, onSelect) {
  var input = document.getElementById(inputId);
  var results = document.getElementById(resultsId);
  var selectedDiv = document.getElementById(selectedId);

  input.addEventListener("input", function() {
    var q = this.value.toLowerCase().trim();
    results.innerHTML = "";

    if (q.length === 0) {
      results.classList.remove("active");
      return;
    }

    var matches = [];
    for (var i = 0; i < list.length && matches.length < 8; i++) {
      if (list[i].toLowerCase().indexOf(q) >= 0) {
        matches.push(list[i]);
      }
    }

    if (matches.length === 0) {
      results.classList.remove("active");
      return;
    }

    matches.forEach(function(match) {
      var item = document.createElement("div");
      item.className = "search-result-item";
      item.textContent = match;
      item.onclick = function() {
        onSelect(match);
        input.value = "";
        results.classList.remove("active");
        selectedDiv.innerHTML = "";
        var tag = document.createElement("span");
        tag.className = "selected-tag";
        tag.textContent = match + " ";
        var clearBtn = document.createElement("span");
        clearBtn.className = "clear-btn";
        clearBtn.textContent = "✕";
        clearBtn.onclick = function() {
          selectedDiv.innerHTML = "";
          if (selectedId === "clienteSelected") selectedCliente = "";
          if (selectedId === "metodoSelected") selectedMetodo = "";
        };
        tag.appendChild(clearBtn);
        selectedDiv.appendChild(tag);
      };
      results.appendChild(item);
    });

    results.classList.add("active");
  });

  document.addEventListener("click", function(e) {
    if (!input.contains(e.target) && !results.contains(e.target)) {
      results.classList.remove("active");
    }
  });
}

tg.MainButton.onClick(function() {
  var valid = true;

  if (!selectedTipo) { show("tipoError"); valid = false; } else { hide("tipoError"); }

  var monto = document.getElementById("monto").value;
  if (!monto || isNaN(parseFloat(monto)) || parseFloat(monto) <= 0) {
    show("montoError"); valid = false;
  } else { hide("montoError"); }

  if (!selectedCliente) { show("clienteError"); valid = false; } else { hide("clienteError"); }
  if (!selectedMetodo) { show("metodoError"); valid = false; } else { hide("metodoError"); }

  if (!valid) return;

  tg.MainButton.showProgress();
  tg.MainButton.setText("Guardando...");

  var userName = "Usuario";
  try {
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
      userName = tg.initDataUnsafe.user.first_name;
      if (tg.initDataUnsafe.user.last_name) {
        userName += " " + tg.initDataUnsafe.user.last_name;
      }
    }
  } catch(e) {}

  fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "text/plain"},
    body: JSON.stringify({
      tipo: selectedTipo,
      monto: monto,
      cliente: selectedCliente,
      metodo: selectedMetodo,
      notas: document.getElementById("notas").value || "",
      userName: userName
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    tg.MainButton.hideProgress();
    if (result.ok) {
      tg.showAlert("✅ Operacion registrada en fila " + result.fila);
      setTimeout(function() { tg.close(); }, 1500);
    } else {
      tg.MainButton.setText("✅ CONFIRMAR");
      tg.showAlert("Error al guardar: " + (result.error || ""));
    }
  })
  .catch(function(err) {
    tg.MainButton.hideProgress();
    tg.MainButton.setText("✅ CONFIRMAR");
    tg.showAlert("Error de conexion: " + err);
  });
});

function show(id) { document.getElementById(id).style.display = "block"; }
function hide(id) { document.getElementById(id).style.display = "none"; }
</script>

</body>
</html>
